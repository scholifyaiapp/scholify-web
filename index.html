<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon: real SVG (vector, 15 KB, scales infinitely) -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />

    <!-- iOS / iPadOS home screen icon -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />

    <!-- Android / PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#050508" />
    <meta name="application-name" content="Scholify" />
    <meta name="apple-mobile-web-app-title" content="Scholify" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Telegram, iMessage) -->
    <meta property="og:title" content="Scholify — AI Learning Coach" />
    <meta
      property="og:description"
      content="Turn any learning goal into a daily habit. Lara builds your plan. You just show up."
    />
    <meta property="og:image" content="https://scholifyapp.com/og-image.png" />
    <meta property="og:url" content="https://scholifyapp.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Scholify" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Scholify — AI Learning Coach" />
    <meta name="twitter:description" content="Not courses. Not content. Consistency." />
    <meta name="twitter:image" content="https://scholifyapp.com/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" />

    <!-- Paddle Billing (checkout) -->
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>

    <title>Scholify — Learn anything, every single day.</title>

    <!-- Apply the saved app theme before paint (avoids a flash) -->
    <script>
      try {
        if (localStorage.getItem("scholify-theme") === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        }
      } catch (e) {}
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
