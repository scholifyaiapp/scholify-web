<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon: the brand mark (deep-red hexagonal circuit). ?v=2 busts
         stale browser favicon caches from the pre-rebrand icon. -->
    <link rel="icon" href="/favicon.ico?v=2" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg?v=2" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png?v=2" />
    <link rel="shortcut icon" href="/favicon.ico?v=2" />

    <!-- iOS / iPadOS home screen icon -->
    <link rel="apple-touch-icon" href="/icon-192.png?v=2" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png?v=2" />

    <!-- Android / PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FAFAF7" />
    <meta name="application-name" content="Scholify" />
    <meta name="apple-mobile-web-app-title" content="Scholify" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Search: the snippet Google shows, and the one host we want indexed.
         The apex 307-redirects to www, so canonical/OG both point at www. -->
    <meta
      name="description"
      content="AI exam prep for ACCA. Original question banks, timed mocks, flashcards and an AI Examiner that marks your written answers in seconds — every paper from BT to AAA."
    />
    <link rel="canonical" href="https://www.scholifyapp.com/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Telegram, iMessage) -->
    <meta property="og:title" content="Scholify — AI exam prep for ACCA students" />
    <meta
      property="og:description"
      content="Original question banks, timed mocks, flashcards and an AI Examiner that marks written answers in seconds. Every paper from BT to AAA."
    />
    <meta property="og:image" content="https://www.scholifyapp.com/og-image.png?v=2" />
    <meta property="og:url" content="https://www.scholifyapp.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Scholify" />
    <meta property="og:locale" content="en_US" />
    <!-- The RU translation is served client-side at the same URL (no distinct
         /ru/ route), so this hints capability without falsely claiming
         separately-crawlable localized pages. -->
    <meta property="og:locale:alternate" content="ru_RU" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Scholify — AI exam prep for ACCA students" />
    <meta name="twitter:description" content="The AI Examiner marks your written answers in seconds. Practice banks for every ACCA paper." />
    <meta name="twitter:image" content="https://www.scholifyapp.com/og-image.png?v=2" />

    <!-- Structured data: only facts that are true today (no ratings/reviews —
         Scholify has none yet and will not fabricate any, per house policy). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Scholify",
        "url": "https://www.scholifyapp.com/",
        "logo": "https://www.scholifyapp.com/logo.svg",
        "description": "AI-tutored ACCA exam preparation — original question banks, timed mocks, spaced-repetition flashcards, and an AI Examiner that marks written answers in seconds."
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Scholify",
        "url": "https://www.scholifyapp.com/",
        "applicationCategory": "EducationApplication",
        "operatingSystem": "Web",
        "description": "AI exam prep for every ACCA paper from BT to AAA: original question banks, timed mocks, an AI Examiner for written answers, spaced-repetition flashcards, and a pass-probability diagnostic that builds a daily study plan.",
        "offers": [
          { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "USD" },
          { "@type": "Offer", "name": "Beginner", "price": "9.99", "priceCurrency": "USD" },
          { "@type": "Offer", "name": "Pro", "price": "14.99", "priceCurrency": "USD" }
        ]
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" />

    <!-- Paddle Billing (checkout) — deferred so it never blocks first paint -->
    <script defer src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>

    <title>Scholify — AI Exam Prep for ACCA | From F1 to ACCA Member</title>

    <!-- Apply the saved app theme before paint (light is the default; avoids a flash) -->
    <script>
      try {
        var t = localStorage.getItem("scholify-theme");
        document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
      } catch (e) {}
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
