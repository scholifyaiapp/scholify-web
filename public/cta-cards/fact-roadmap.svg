<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="rm-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3A0D16"/>
      <stop offset="1" stop-color="#14141A"/>
    </linearGradient>
    <linearGradient id="rm-track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C80000"/>
      <stop offset="1" stop-color="#F4A405"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#rm-bg)"/>

  <!-- faint hexagon watermarks, matching the sibling cards -->
  <g opacity="0.10" stroke="#F4A405" stroke-width="2" fill="none">
    <path d="M700,70 L724,84 L724,112 L700,126 L676,112 L676,84 Z"/>
    <path d="M120,300 L138,310 L138,332 L120,342 L102,332 L102,310 Z"/>
  </g>

  <!-- headline + label, kept in the vertically-safe centre band so an
       object-cover crop to ~200px never clips them -->
  <text x="60" y="150" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="64" fill="#FFFFFF">13 papers.</text>
  <text x="63" y="185" font-family="Arial, sans-serif" font-size="18" letter-spacing="3" fill="#F4A405">ONE PATH · BT TO ACCA MEMBER</text>

  <!-- the roadmap: one track, four clearly-labelled stages, ending in a
       gold Member node with a tick -->
  <line x1="95" y1="250" x2="705" y2="250" stroke="url(#rm-track)" stroke-width="3"/>

  <!-- Knowledge -->
  <circle cx="95" cy="250" r="7" fill="#14141A" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="95" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" letter-spacing="1" fill="rgba(255,255,255,0.75)">KNOWLEDGE</text>

  <!-- Skills -->
  <circle cx="298" cy="250" r="7" fill="#14141A" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="298" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" letter-spacing="1" fill="rgba(255,255,255,0.75)">SKILLS</text>

  <!-- Strategic -->
  <circle cx="501" cy="250" r="7" fill="#14141A" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="501" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" letter-spacing="1" fill="rgba(255,255,255,0.75)">STRATEGIC</text>

  <!-- Member (highlighted) -->
  <circle cx="705" cy="250" r="13" fill="#F4A405"/>
  <path d="M698,250 l5,5 l9,-10" fill="none" stroke="#14141A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="705" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="13" letter-spacing="1" fill="#F4A405">MEMBER</text>
</svg>
