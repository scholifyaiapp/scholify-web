<!doctype html>
<!--
  Scholify OG image generator (1200×630).

  The live preview meta tags point at /og-image.png. To refresh that asset:
    1. Open this file in a browser (it renders the card at exactly 1200×630).
    2. Screenshot just the .card element (or use a headless tool, e.g.
       `npx playwright screenshot --viewport-size=1200,630 scripts/og-image.html public/og-image.png`).
    3. Commit the new public/og-image.png.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Scholify OG image</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: "Geist", system-ui, -apple-system, sans-serif;
      }
      .card {
        width: 1200px;
        height: 630px;
        position: relative;
        overflow: hidden;
        background: radial-gradient(120% 120% at 30% 20%, #120820 0%, #050508 55%, #0a1520 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #f0eeff;
      }
      .glow {
        position: absolute;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(139, 92, 246, 0.28), rgba(139, 92, 246, 0) 70%);
        top: -180px;
      }
      .brand {
        position: relative;
        font-size: 84px;
        font-weight: 800;
        letter-spacing: -2px;
        background: linear-gradient(135deg, #a78bfa 0%, #818cf8 35%, #f0abfc 70%, #fbbf24 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }
      .tagline {
        position: relative;
        margin-top: 24px;
        font-size: 34px;
        font-weight: 500;
        color: #f0eeff;
        max-width: 820px;
      }
      .sub {
        position: relative;
        margin-top: 16px;
        font-size: 20px;
        color: rgba(240, 238, 255, 0.55);
      }
      .corner {
        position: absolute;
        right: 40px;
        bottom: 32px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 18px;
        color: rgba(240, 238, 255, 0.6);
      }
      .corner .tree { font-size: 30px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="glow"></div>
      <div class="brand">✦ Scholify</div>
      <div class="tagline">Turn any learning goal into a daily habit.</div>
      <div class="sub">Lara builds your plan. You just show up.</div>
      <div class="corner"><span class="tree">🌳</span> scholifyapp.com</div>
    </div>
  </body>
</html>
